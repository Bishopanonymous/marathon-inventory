<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marathon — Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── TOP BAR ──────────────────────────────────────────── -->
<div id="topbar">
  <div class="tb-left">
    <div class="rank-orb"><span>01</span></div>
    <div class="tb-div"></div>
    <div class="stat-chip"><svg-icon type="rank"></svg-icon> <strong>I</strong></div>
    <div class="tb-div"></div>
    <div class="stat-chip"><svg-icon type="shield-sm"></svg-icon> <strong>0</strong></div>
    <div class="tb-div"></div>
    <div class="stat-chip">&#8801; <strong>0/250</strong></div>
    <div class="tb-div"></div>
    <div class="stat-chip">&#11041; <strong>9,560</strong></div>
    <div class="tb-div"></div>
    <div class="hud-value">LOADOUT VALUE &nbsp;<span class="amt" id="lv-num">&#11041;0</span></div>
  </div>
  <div class="tb-right">
    <div class="hud-timer" id="timer">21:29</div>
    <div class="tb-div" style="margin:0 6px"></div>
    <button class="nav-tab">CUSTOMIZE <span class="tab-badge">9</span></button>
    <button class="nav-tab">LOADOUT</button>
    <button class="nav-tab active">VAULT</button>
    <button class="nav-tab">WARES</button>
  </div>
</div>

<!-- ── MAIN LAYOUT ──────────────────────────────────────── -->
<div id="main">

  <!-- LEFT: Loadout -->
  <div class="panel-wrap">
    <div class="panel-header">
      <span class="panel-title">Loadout</span>
      <span class="panel-count" id="loadout-val-small">&#11041;0</span>
    </div>
    <div class="panel-body" id="left-panel"></div>
  </div>

  <!-- CENTER: Backpack -->
  <div id="center-panel">
    <div class="panel-header">
      <span class="panel-title">Backpack</span>
      <span class="panel-count" id="bp-count">0/16</span>
    </div>
    <div class="bp-grid" id="backpack-grid"></div>
  </div>

  <!-- RIGHT: Vault -->
  <div id="right-panel">
    <div class="vault-header">
      <span class="vault-title">VAULT</span>
      <span class="vault-count" id="vault-count">0/160</span>
    </div>
    <div class="vault-value-row">
      <span class="vault-value-label">VAULT VALUE</span>
      <span class="vault-value-amt" id="vault-val">&#11041;0</span>
    </div>
    <div class="vault-layout">
      <div class="icon-sidebar" id="icon-sidebar">
        <button class="icon-btn active" data-filter="0" title="All">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="icon-btn" data-filter="1" title="Weapons">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12h2l1.5-3.5 2.5 7 2.5-6.5 2 3H18l2-1"/><line x1="2" y1="16" x2="5" y2="16"/></svg>
        </button>
        <button class="icon-btn" data-filter="2" title="Tactical">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="2.5"/><path d="M12 4v2M12 18v2M4 12h2M18 12h2M6.34 6.34l1.42 1.42M16.24 16.24l1.42 1.42M6.34 17.66l1.42-1.42M16.24 7.76l1.42-1.42"/></svg>
        </button>
        <button class="icon-btn" data-filter="3" title="Ammo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="3" width="6" height="9" rx="2"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
        </button>
        <button class="icon-btn" data-filter="4" title="Consumables">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M9 14h6M12 11v6"/><path d="M8 8V6a2 2 0 0 1 4 0v2M12 8V6a2 2 0 0 1 4 0v2"/></svg>
        </button>
        <div class="sidebar-divider"></div>
        <button class="icon-btn" title="Cores">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </button>
        <button class="icon-btn" title="Implants">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="6" y="6" width="12" height="12" rx="2"/><line x1="12" y1="6" x2="12" y2="3"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="6" y1="12" x2="3" y2="12"/><line x1="18" y1="12" x2="21" y2="12"/></svg>
        </button>
        <button class="icon-btn" title="Modules">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        </button>
      </div>
      <div class="vault-scroll">
        <div class="vault-grid" id="vault-grid"></div>
      </div>
    </div>
  </div>

</div>

<!-- ── MOD FOCUS PANEL ──────────────────────────────────── -->
<div id="mod-focus-panel">
  <div class="mfp-rarity-bar" id="mfp-rarity-bar"></div>
  <div class="mfp-header">
    <div class="mfp-icon" id="mfp-icon"></div>
    <div class="mfp-info">
      <div class="mfp-slot-name" id="mfp-slot-name"></div>
      <div class="mfp-item-name" id="mfp-item-name"></div>
    </div>
  </div>
  <div id="mfp-stats"></div>
  <div class="mfp-actions" id="mfp-actions"></div>
</div>

<!-- ── MOD PICKER MODAL ─────────────────────────────────── -->
<div id="mod-overlay"></div>
<div id="mod-modal">
  <div class="mod-modal-header">
    <div>
      <div class="mod-modal-title" id="mod-modal-title">SELECT MOD</div>
      <div class="mod-modal-sub"  id="mod-modal-sub">Choose a tactical item</div>
    </div>
    <button class="mod-modal-close" id="mod-modal-close">&times;</button>
  </div>
  <div class="mod-items-scroll" id="mod-items-scroll"></div>
  <div class="mod-modal-hint" id="mod-modal-hint"></div>
</div>

<!-- ── CONTEXT MENU ──────────────────────────────────────── -->
<div id="ctx-overlay"></div>
<div id="ctx-menu">
  <div class="ctx-rarity-bar" id="ctx-rarity-bar"></div>
  <div id="ctx-hdr">
    <span class="ctx-icon" id="ctx-icon"></span>
    <div class="ctx-hdr-info">
      <div class="ctx-hdr-name" id="ctx-hdr-name"></div>
      <div class="ctx-hdr-full" id="ctx-hdr-full"></div>
    </div>
    <span class="ctx-hdr-val" id="ctx-hdr-val"></span>
  </div>
  <div id="ctx-body">
    <div id="ctx-desc"></div>
    <div id="ctx-stats"></div>
  </div>
  <div id="ctx-actions"></div>
</div>

<!-- ── COMPARE PANEL ─────────────────────────────────────── -->
<div id="compare-panel" class="hidden">
  <div class="cmp-label">CURRENTLY EQUIPPED</div>
  <div class="cmp-cols">
    <div class="cmp-col">
      <div class="cmp-col-hdr">EQUIPPED</div>
      <div class="cmp-icon" id="cmp-eqp-icon"></div>
      <div class="cmp-name" id="cmp-eqp-name"></div>
      <div class="cmp-rarity" id="cmp-eqp-rarity"></div>
    </div>
    <div class="cmp-vs">VS</div>
    <div class="cmp-col">
      <div class="cmp-col-hdr">COMPARING</div>
      <div class="cmp-icon" id="cmp-foc-icon"></div>
      <div class="cmp-name" id="cmp-foc-name"></div>
      <div class="cmp-rarity" id="cmp-foc-rarity"></div>
    </div>
  </div>
  <div class="cmp-stats" id="cmp-stats"></div>
</div>

<!-- ── SWAP PICKER ───────────────────────────────────────── -->
<div id="swap-picker">
  <div id="swap-picker-title">SELECT WEAPON SLOT TO SWAP</div>
  <div class="swap-option" id="swap-opt-0"><span class="sw-key">&#9650; UP</span><span class="sw-label" id="swap-label-0"></span></div>
  <div class="swap-option" id="swap-opt-1"><span class="sw-key">&#9660; DOWN</span><span class="sw-label" id="swap-label-1"></span></div>
</div>

<!-- ── UTILITY ───────────────────────────────────────────── -->
<div id="lp-ring">
  <svg width="36" height="36" viewBox="0 0 36 36">
    <circle class="track" cx="18" cy="18" r="14"/>
    <circle class="prog" id="lp-prog" cx="18" cy="18" r="14" stroke-dasharray="88" stroke-dashoffset="88"/>
  </svg>
</div>
<div id="nav-hint">
  <span><b>&#8592;&#8593;&#8594;&#8595;</b> Navigate</span>
  <span><b>Enter / X</b> Action</span>
  <span><b>Q</b> Move mod to backpack</span>
  <span><b>Esc</b> Cancel</span>
</div>
<div id="gp-toast"></div>

<script src="app.js"></script>
</body>
</html>
